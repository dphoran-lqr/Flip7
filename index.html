<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip 7</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flip 7" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="theme-color" content="#30ced5" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&family=Questrial&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="assets/index-C2YwLGvX.css" />
    <script type="module" src="assets/index-DIj0IY0c.js"></script>

    <style>
      body {
        overflow: hidden;
        margin: 0;
        height: 100dvh;
        width: 100svw;
        background-color: #30ced5;
      }
      /* FIX 1: Hide the "New Feature" toast notification permanently */
      .Toastify__toast-container { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- FIX 2: Broken Flip 7 logo — swap in the Firebase-hosted version -->
    <script>
      document.addEventListener('error', function(e) {
        if (e.target.tagName === 'IMG' &&
            e.target.src &&
            e.target.src.includes('Flip-7-Logo')) {
          e.target.src = 'https://flip7-46611.web.app/assets/Flip-7-Logo-C2nj5RPA.png';
        }
      }, true);
    </script>

    <!-- FIX 3: Round navigation arrow cut off on the right on mobile -->
    <script>
      (function () {
        function fixLayout() {
          if (window.innerWidth >= 600) return;
          var els = document.querySelectorAll('#root div');
          for (var i = 0; i < els.length; i++) {
            var cs = window.getComputedStyle(els[i]);
            if (
              cs.display === 'grid' &&
              cs.overflow === 'hidden' &&
              Math.round(parseFloat(cs.marginRight)) === 16 &&
              Math.round(parseFloat(cs.marginLeft)) === 16
            ) {
              els[i].style.width = 'calc(100% - 32px)';
              return;
            }
          }
          setTimeout(fixLayout, 300);
        }
        if (document.readyState === 'complete') {
          setTimeout(fixLayout, 500);
        } else {
          window.addEventListener('load', function () { setTimeout(fixLayout, 500); });
        }
      })();
    </script>

    <!-- Service worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function () {});
        });
      }
    </script>
  </body>
</html>
