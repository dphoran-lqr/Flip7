<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip 7</title>

    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Flip 7" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="theme-color" content="#30ced5" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@100..900&family=Questrial&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="assets/index-C2YwLGvX.css" />
    <script type="module" src="assets/index-DIj0IY0c.js"></script>

    <style>
      body {
        overflow: hidden;
        margin: 0;
        height: 100dvh;
        width: 100svw;
        background-color: #30ced5;
      }
      /* Hide the "New Feature" toast permanently */
      .Toastify__toast-container { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Fix broken Flip 7 logo -->
    <script>
      document.addEventListener('error', function(e) {
        if (e.target.tagName === 'IMG' && e.target.src && e.target.src.includes('Flip-7-Logo')) {
          e.target.src = 'https://flip7-46611.web.app/assets/Flip-7-Logo-C2nj5RPA.png';
        }
      }, true);
    </script>

    <!-- Fix right arrow cutoff on mobile -->
    <script>
      (function() {
        if (window.innerWidth >= 600) return;

        function fixOverflow() {
          var all = document.querySelectorAll('#root div');
          for (var i = 0; i < all.length; i++) {
            var el = all[i];
            var cs = window.getComputedStyle(el);
            var mr = Math.round(parseFloat(cs.marginRight));
            var ml = Math.round(parseFloat(cs.marginLeft));
            var w  = Math.round(parseFloat(cs.width));
            // Target elements that are ~full-viewport-width AND have 16px margins both sides
            if (mr === 16 && ml === 16 && w >= window.innerWidth - 10) {
              el.style.setProperty('width', 'calc(100% - 32px)', 'important');
            }
          }
        }

        // Run several times to catch React's render cycles
        [300, 600, 1000, 2000].forEach(function(ms) {
          setTimeout(fixOverflow, ms);
        });

        // Keep watching for React re-renders
        var observer = new MutationObserver(function() {
          setTimeout(fixOverflow, 100);
        });

        function startObserver() {
          var root = document.getElementById('root');
          if (root) {
            observer.observe(root, { childList: true, subtree: true });
          } else {
            setTimeout(startObserver, 100);
          }
        }
        startObserver();
      })();
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('sw.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
